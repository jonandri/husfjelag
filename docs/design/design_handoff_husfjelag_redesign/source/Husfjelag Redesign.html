<!DOCTYPE html>
<html lang="is">
<head>
  <meta charset="UTF-8">
  <title>Húsfjelag — Endurhönnun</title>
  <link rel="icon" href="ds/assets/logo-192.png">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="shell.jsx"></script>

  <script type="text/babel" src="yfirlit-current.jsx"></script>
  <script type="text/babel" src="yfirlit-v1.jsx"></script>
  <script type="text/babel" src="yfirlit-v2.jsx"></script>
  <script type="text/babel" src="yfirlit-v3.jsx"></script>

  <script type="text/babel" src="husfelag-current.jsx"></script>
  <script type="text/babel" src="husfelag-v1.jsx"></script>
  <script type="text/babel" src="husfelag-v2.jsx"></script>
  <script type="text/babel" src="husfelag-v3.jsx"></script>
  <script type="text/babel" src="husfelag-final.jsx"></script>

  <script type="text/babel" data-presets="react">
    const W = 1280, H = 820;

    function App() {
      return (
        <window.DesignCanvas title="Húsfjelag — endurhönnun" subtitle="Valdar áttir: Yfirlit V1 + Húsfélag (uppsetning → daglegur rekstur)">
          <window.DCSection id="yfirlit" title="Yfirlit (mælaborð)" subtitle="Valið: V1 — fyrir alla notendur að sjá heildarstöðu">
            <window.DCArtboard id="y1" label="Yfirlit · Valin tillaga (V1)" width={W} height={H}><window.YfirlitV1 /></window.DCArtboard>
            <window.DCArtboard id="y0" label="Núverandi (til samanburðar)" width={W} height={H}><window.YfirlitCurrent /></window.DCArtboard>
            <window.DCArtboard id="y2" label="V2 · Þétt / utilitarian" width={W} height={H}><window.YfirlitV2 /></window.DCArtboard>
            <window.DCArtboard id="y3" label="V3 · Tóm uppsetning" width={W} height={H}><window.YfirlitV3 /></window.DCArtboard>
          </window.DCSection>

          <window.DCSection id="husfelag" title="Húsfélag (aðalsíða)" subtitle="Tvö stig: uppsetning fyrir nýtt félag, og daglegur rekstur eftir uppsetningu">
            <window.DCArtboard id="h-setup" label="① Uppsetning (V3 — nýtt félag)" width={W} height={H}><window.HusfelagV3 /></window.DCArtboard>
            <window.DCArtboard id="h-final" label="② Daglegur rekstur (eftir uppsetningu)" width={W} height={H}><window.HusfelagFinal /></window.DCArtboard>
            <window.DCArtboard id="h0" label="Núverandi (til samanburðar)" width={W} height={H}><window.HusfelagCurrent /></window.DCArtboard>
          </window.DCSection>
        </window.DesignCanvas>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
